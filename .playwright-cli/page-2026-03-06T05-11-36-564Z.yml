                - heading "Pro tips" [level=3] [ref=e274]
                - paragraph [ref=e276]: Embedding the scheduler on Wix works as on any other website builder - select custom code element, add the code from iClosed and save changes.
                - paragraph [ref=e278]
                - paragraph [ref=e280]: But bear in mind that Wix won't allow redirections outside of the parent page after the call is booked unless you're on Premium Wix Plan.
                - paragraph [ref=e282]: "In case your Wix plan doesn't support this option, you can use following workaround:"
                - list [ref=e284]:
                  - listitem [ref=e285]:
                    - paragraph [ref=e287]: Set up standard redirecting on a click of a button - e.g. Book a call here button on your main page
                  - listitem [ref=e288]:
                    - paragraph [ref=e290]: Add direct iClosed scheduling link instead of the embed code
                  - listitem [ref=e291]:
                    - paragraph [ref=e293]: This will open iClosed scheduler external URL that will lead later to thank you page as per Confirmation page settings in iClosed.
                  - listitem [ref=e294]:
                    - paragraph [ref=e296]: after the call is booked, it will redirect automatically to confirmation page URL that you've set in iClosed event settings
