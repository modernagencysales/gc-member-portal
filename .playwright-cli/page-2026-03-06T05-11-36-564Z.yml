              - separator [ref=e310]
              - heading "Best practices and FAQ's" [level=1] [ref=e312]
              - heading "Can I place iClosed iframe inside the iFrame (parent)?" [level=3] [ref=e314]
              - paragraph [ref=e316]: Yes, but it's not advisable since the iframe parent may block iClosed widget to show or to block redirecting to the secondary "Thank you" page after the call is booked.
              - paragraph [ref=e318]
              - paragraph [ref=e320]: This may also prevent iClosed iframe to interact with the HTML elements inside of the frame, in case you have set restrictions to Same-Origin policy on your website.
              - separator [ref=e322]
              - heading "Is it possible to interact with HTML elements in the iClosed iframe?" [level=3] [ref=e324]
              - paragraph [ref=e326]: No iframe allows you to edit HTML elements inside or out that of iframe, It's standard cross-origin-site restriction set by browsers.
              - separator [ref=e328]
              - heading "What could be the reasons for scheduler not to display on my website?" [level=3] [ref=e330]
              - paragraph [ref=e332]: Before proceeding with the troubleshooting steps, please make sure that the embed code provided by iClosed was not changed manually, and that is properly placed in the website builder.
              - heading "Troubleshooting checklist:" [level=4] [ref=e334]
              - list [ref=e336]:
                - listitem [ref=e337]:
                  - paragraph [ref=e339]: Check the browser console for errors (CSP violations, X-Frame-Options, CORS, JavaScript errors).
                - listitem [ref=e340]:
                  - paragraph [ref=e342]: Test on a different browser/device/network to rule out extensions or local issues.
                - listitem [ref=e343]:
                  - paragraph [ref=e345]: Verify the iframe source URL works directly in a browser.
                - listitem [ref=e346]:
                  - paragraph [ref=e348]: Inspect the parent page's CSS and JavaScript for conflicts.
                - listitem [ref=e349]:
                  - paragraph [ref=e351]: Contact the scheduler provider if the issue persists.
